<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donation Cancelled — Nauwigewauk Community Club</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="NCC_logo.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .status-section {
      margin-top: 132px; min-height: calc(100vh - 132px);
      display: flex; align-items: center; justify-content: center;
      background: var(--navy-dark); text-align: center; padding: 4rem 2rem;
      position: relative; overflow: hidden;
    }
    .status-section::before {
      content: '🍁'; position: absolute; font-size: 18rem; opacity: 0.04;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .status-inner { position: relative; z-index: 1; max-width: 560px; }
    .status-icon { font-size: 3.5rem; margin-bottom: 1.5rem; display: block; }
    .status-title {
      font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3rem);
      color: #fff; font-weight: 800; margin-bottom: 1.25rem; line-height: 1.15;
    }
    .status-title em { font-style: italic; color: var(--gold-lt); }
    .status-body {
      font-family: 'Lora', serif; color: rgba(255,255,255,0.7);
      font-size: 1.05rem; line-height: 1.85; margin-bottom: 2.5rem;
    }
    .status-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>

<section class="status-section">
  <div class="status-inner">
    <span class="status-icon">👋</span>
    <h1 class="status-title">No Worries <em>At All</em></h1>
    <p class="status-body">Your donation was not completed, and nothing was charged. If something went wrong, or you'd simply prefer another way to give, e-Transfer is always an option — or feel free to try again whenever you're ready.</p>
    <div class="status-actions">
      <a href="donate.html" class="btn btn-gold">Back to Donate Page</a>
      <a href="index.html" class="btn btn-outline">Back to Home</a>
    </div>
  </div>
</section>

<script src="nav.js"></script>
</body>
</html>
